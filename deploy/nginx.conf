# /etc/nginx/sites-available/interstellar-trade
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/interstellar-trade
#   sudo ln -s /etc/nginx/sites-available/interstellar-trade \
#              /etc/nginx/sites-enabled/interstellar-trade
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates are managed by Certbot (Let's Encrypt).
# Run:  sudo certbot --nginx -d yourdomain.com
# Certbot will patch the ssl_certificate lines automatically.
# Replace every occurrence of "yourdomain.com" with your actual domain.

# ── Rate limiting zones (defined once in http context) ───────────────────────
# Declare these in /etc/nginx/nginx.conf (inside the http {} block) if they
# clash with other sites, or keep them here if this is your only site.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ── Redirect plain HTTP → HTTPS ───────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com;

    # Allow Let's Encrypt ACME challenge through before the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main site ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name yourdomain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Certbot will replace these paths when you run: certbot --nginx -d yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS — tell browsers to always use HTTPS.
    # Start with a short max-age (300s) then raise to 31536000 once stable.
    add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';"
        always;

    # ── Proxy settings ───────────────────────────────────────────────────────
    # The container listens on 127.0.0.1:8080 (see compose.yml ports binding).
    upstream trade_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # ── Timeouts ─────────────────────────────────────────────────────────────
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── Proxy headers passed to Go ───────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";   # Enable keepalive to upstream

    # ── Auth endpoints — stricter rate limit ─────────────────────────────────
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://trade_backend;
    }

    # ── All other API endpoints ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        # Max request body size for bundle import (contains signed envelopes).
        client_max_body_size 4m;

        proxy_pass http://trade_backend;
    }

    # ── Frontend SPA — everything else ───────────────────────────────────────
    # The Go binary serves the built React app as static files. nginx just
    # proxies; it does NOT serve files directly. This keeps the Go binary as
    # the single source of truth for which assets exist.
    location / {
        proxy_pass http://trade_backend;

        # Cache immutable hashed assets (vite fingerprints JS/CSS filenames).
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|webp|ico)$ {
            proxy_pass http://trade_backend;
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }
    }

    # ── Block dot-files ───────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/interstellar-trade.access.log combined;
    error_log  /var/log/nginx/interstellar-trade.error.log warn;
}
